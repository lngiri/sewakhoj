<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SewаKhoj — Worker Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #C0392B; --red-dark: #96281B; --gold: #F0A500;
      --dark: #1A1A2E; --gray: #6B7280; --light: #F9FAFB;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--light); color: var(--dark); }

    /* LOGIN */
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--dark); }
    .login-box { background: white; border-radius: 24px; padding: 3rem; width: 100%; max-width: 400px; text-align: center; }
    .login-logo { font-size: 2rem; font-weight: 800; color: var(--red); margin-bottom: 0.5rem; }
    .login-logo span { color: var(--gold); }
    .login-sub { color: var(--gray); font-size: 0.9rem; margin-bottom: 2rem; }
    .login-box input {
      width: 100%; padding: 0.85rem 1rem; border: 2px solid #E5E7EB;
      border-radius: 12px; font-size: 0.95rem; font-family: 'Plus Jakarta Sans', sans-serif;
      margin-bottom: 1rem; outline: none; transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: var(--red); }
    .login-btn {
      width: 100%; padding: 1rem; background: var(--red); color: white;
      border: none; border-radius: 12px; font-size: 1rem; font-weight: 700;
      cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .login-btn:hover { background: var(--red-dark); }
    .login-error { color: var(--red); font-size: 0.85rem; margin-top: 0.8rem; display: none; }
    .login-note { color: var(--gray); font-size: 0.8rem; margin-top: 1rem; line-height: 1.5; }

    /* DASHBOARD */
    .dashboard { display: none; min-height: 100vh; }

    /* HEADER */
    .header {
      background: var(--dark); color: white;
      padding: 1rem 2rem; display: flex;
      align-items: center; justify-content: space-between;
    }
    .header-logo { font-size: 1.3rem; font-weight: 800; color: white; }
    .header-logo span { color: var(--gold); }
    .worker-info { display: flex; align-items: center; gap: 1rem; }
    .worker-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--red), var(--gold));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem;
    }
    .worker-name-header { font-weight: 600; font-size: 0.95rem; }
    .worker-service-header { font-size: 0.8rem; color: rgba(255,255,255,0.6); }
    .logout-btn {
      background: rgba(255,255,255,0.1); color: white;
      border: none; padding: 0.5rem 1rem; border-radius: 8px;
      cursor: pointer; font-size: 0.85rem; font-weight: 600;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    /* MAIN */
    .main { padding: 2rem; max-width: 900px; margin: 0 auto; }
    .welcome-card {
      background: linear-gradient(135deg, var(--red), var(--red-dark));
      border-radius: 20px; padding: 2rem; color: white; margin-bottom: 2rem;
    }
    .welcome-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    .welcome-sub { opacity: 0.85; font-size: 0.95rem; }

    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; margin-bottom: 2rem; }
    .stat-card { background: white; border-radius: 16px; padding: 1.2rem; text-align: center; box-shadow: var(--shadow); }
    .stat-num { font-size: 1.8rem; font-weight: 800; color: var(--red); }
    .stat-label { font-size: 0.8rem; color: var(--gray); margin-top: 0.2rem; }

    .section-title { font-size: 1.2rem; font-weight: 800; margin-bottom: 1rem; }
    .bookings-list { display: flex; flex-direction: column; gap: 1rem; }
    .booking-card {
      background: white; border-radius: 16px; padding: 1.5rem;
      box-shadow: var(--shadow); border-left: 4px solid var(--red);
    }
    .booking-card.completed { border-left-color: #16A34A; }
    .booking-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .booking-name { font-weight: 700; font-size: 1rem; }
    .badge { padding: 0.3rem 0.8rem; border-radius: 50px; font-size: 0.75rem; font-weight: 600; }
    .badge-confirmed { background: #DBEAFE; color: #2563EB; }
    .badge-completed { background: #DCFCE7; color: #16A34A; }
    .badge-pending { background: #FEF3C7; color: #D97706; }
    .booking-details { display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 1rem; }
    .detail-item { font-size: 0.85rem; color: var(--gray); }
    .detail-item strong { color: var(--dark); }
    .booking-actions { display: flex; gap: 0.8rem; }
    .action-btn {
      padding: 0.6rem 1.2rem; border-radius: 10px; border: none;
      font-size: 0.85rem; font-weight: 600; cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif; transition: opacity 0.2s;
    }
    .action-btn:hover { opacity: 0.85; }
    .btn-call { background: #DBEAFE; color: #2563EB; }
    .btn-complete { background: #DCFCE7; color: #16A34A; }
    .empty { text-align: center; padding: 3rem; color: var(--gray); background: white; border-radius: 16px; }

    @media (max-width: 600px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .booking-details { grid-template-columns: 1fr; }
      .main { padding: 1rem; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-box">
    <div class="login-logo">सेवा<span>Khoj</span></div>
    <div class="login-sub">Worker Login</div>
    <input type="tel" id="workerPhone" placeholder="Your Phone Number (98XXXXXXXX)" />
    <input type="password" id="workerPass" placeholder="Your Password" />
    <button class="login-btn" onclick="login()">🔐 Login</button>
    <div class="login-error" id="loginError">❌ Wrong phone or password!</div>
    <div class="login-note">⚠️ Password is set by admin after your registration is approved.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">
  <div class="header">
    <div class="header-logo">सेवा<span>Khoj</span></div>
    <div class="worker-info">
      <div class="worker-avatar">👷</div>
      <div>
        <div class="worker-name-header" id="workerNameHeader">Worker</div>
        <div class="worker-service-header" id="workerServiceHeader">Service</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">🚪 Logout</button>
  </div>

  <div class="main">
    <div class="welcome-card">
      <div class="welcome-title">👋 Welcome, <span id="welcomeName">Worker</span>!</div>
      <div class="welcome-sub">Here are your assigned jobs for today. Complete them on time! 💪</div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num" id="statTotal">0</div>
        <div class="stat-label">Total Jobs</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statPending">0</div>
        <div class="stat-label">Pending</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="statDone">0</div>
        <div class="stat-label">Completed</div>
      </div>
    </div>

    <div class="section-title">📋 Your Assigned Jobs</div>
    <div class="bookings-list" id="bookingsList">
      <div class="empty">Loading your jobs...</div>
    </div>
  </div>
</div>

<script>
  const API_URL = 'https://sewakhoj.onrender.com/api';
  let currentWorker = null;

  async function login() {
    const phone = document.getElementById('workerPhone').value.trim();
    const password = document.getElementById('workerPass').value;

    if (!phone || !password) {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('loginError').textContent = '❌ Please enter phone and password!';
      return;
    }

    try {
      const res = await fetch(`${API_URL}/workers/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone, password })
      });
      const data = await res.json();

      if (data.success) {
        currentWorker = data.worker;
        localStorage.setItem('workerToken', data.token);
        localStorage.setItem('workerData', JSON.stringify(data.worker));
        showDashboard();
      } else {
        document.getElementById('loginError').style.display = 'block';
        document.getElementById('loginError').textContent = '❌ ' + data.message;
      }
    } catch (err) {
      document.getElementById('loginError').style.display = 'block';
      document.getElementById('loginError').textContent = '❌ Connection error. Try again!';
    }
  }

  function showDashboard() {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('workerNameHeader').textContent = currentWorker.full_name;
    document.getElementById('workerServiceHeader').textContent = currentWorker.service;
    document.getElementById('welcomeName').textContent = currentWorker.full_name.split(' ')[0];
    loadBookings();
  }

  async function loadBookings() {
    try {
      const res = await fetch(`${API_URL}/bookings/worker/${currentWorker.id}`);
      const bookings = await res.json();

      const total = bookings.length;
      const completed = bookings.filter(b => b.status === 'completed').length;
      const pending = bookings.filter(b => b.status !== 'completed').length;

      document.getElementById('statTotal').textContent = total;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statDone').textContent = completed;

      const container = document.getElementById('bookingsList');

      if (bookings.length === 0) {
        container.innerHTML = '<div class="empty">📭 No jobs assigned yet! Check back later.</div>';
        return;
      }

      container.innerHTML = bookings.map(b => `
        <div class="booking-card ${b.status === 'completed' ? 'completed' : ''}">
          <div class="booking-header">
            <div class="booking-name">${b.full_name}</div>
            <span class="badge badge-${b.status}">${b.status}</span>
          </div>
          <div class="booking-details">
            <div class="detail-item">📱 <strong>${b.phone}</strong></div>
            <div class="detail-item">🔧 <strong>${b.service}</strong></div>
            <div class="detail-item">📍 <strong>${b.address}</strong></div>
            <div class="detail-item">📅 <strong>${b.preferred_date}</strong></div>
            ${b.message ? `<div class="detail-item" style="grid-column:span 2">💬 <strong>${b.message}</strong></div>` : ''}
          </div>
          <div class="booking-actions">
            <a href="tel:${b.phone}" class="action-btn btn-call">📞 Call Customer</a>
            ${b.status !== 'completed' ? `<button class="action-btn btn-complete" onclick="completeJob('${b._id}')">✅ Mark Complete</button>` : ''}
          </div>
        </div>
      `).join('');
    } catch (err) {
      document.getElementById('bookingsList').innerHTML = '<div class="empty">❌ Error loading jobs. Try refreshing!</div>';
    }
  }

  async function completeJob(id) {
    try {
      await fetch(`${API_URL}/bookings/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ status: 'completed' })
      });
      loadBookings();
    } catch (err) {
      alert('Error updating job!');
    }
  }

  function logout() {
    localStorage.removeItem('workerToken');
    localStorage.removeItem('workerData');
    currentWorker = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('workerPhone').value = '';
    document.getElementById('workerPass').value = '';
  }

  // Auto login if token exists
  window.onload = function() {
    const saved = localStorage.getItem('workerData');
    if (saved) {
      currentWorker = JSON.parse(saved);
      showDashboard();
    }
  }

  document.addEventListener('keypress', function(e) {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
