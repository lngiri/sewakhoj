<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SewаKhoj — Rate Your Experience</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --red: #C0392B; --red-dark: #96281B; --gold: #F0A500;
      --dark: #1A1A2E; --gray: #6B7280; --light: #FFF9F2;
      --shadow: 0 4px 24px rgba(192,57,43,0.10);
    }
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }

    .card {
      background: white; border-radius: 28px;
      padding: 3rem; width: 100%; max-width: 480px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .logo { font-size: 1.6rem; font-weight: 800; color: var(--red); text-align: center; margin-bottom: 0.3rem; }
    .logo span { color: var(--gold); }
    .subtitle { text-align: center; color: var(--gray); font-size: 0.9rem; margin-bottom: 2rem; }

    .worker-info {
      background: var(--light); border-radius: 16px;
      padding: 1.2rem; display: flex; align-items: center;
      gap: 1rem; margin-bottom: 2rem;
    }
    .worker-avatar {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, var(--red), var(--gold));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; flex-shrink: 0;
    }
    .worker-name { font-weight: 700; font-size: 1rem; }
    .worker-service { font-size: 0.82rem; color: var(--gray); margin-top: 0.2rem; }

    .section-label { font-weight: 700; font-size: 0.9rem; margin-bottom: 1rem; color: var(--dark); }

    /* STARS */
    .stars-container { display: flex; gap: 0.8rem; justify-content: center; margin-bottom: 0.5rem; }
    .star {
      font-size: 2.8rem; cursor: pointer;
      transition: transform 0.15s; filter: grayscale(1); opacity: 0.4;
    }
    .star:hover, .star.active { filter: grayscale(0); opacity: 1; transform: scale(1.2); }
    .star-label { text-align: center; color: var(--gray); font-size: 0.85rem; margin-bottom: 1.5rem; height: 1.2rem; }

    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-weight: 600; font-size: 0.85rem; margin-bottom: 0.4rem; color: var(--dark); }
    .form-group input, .form-group textarea {
      width: 100%; padding: 0.85rem 1rem;
      border: 2px solid #E5E7EB; border-radius: 12px;
      font-size: 0.95rem; font-family: 'Plus Jakarta Sans', sans-serif;
      color: var(--dark); outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--red); }
    .form-group textarea { height: 100px; resize: none; }

    .submit-btn {
      width: 100%; padding: 1rem; background: var(--red); color: white;
      border: none; border-radius: 12px; font-size: 1rem; font-weight: 700;
      cursor: pointer; font-family: 'Plus Jakarta Sans', sans-serif;
      transition: background 0.2s, transform 0.2s;
    }
    .submit-btn:hover { background: var(--red-dark); transform: translateY(-1px); }

    /* SUCCESS */
    .success-screen {
      display: none; text-align: center; padding: 2rem 0;
    }
    .success-icon { font-size: 4rem; margin-bottom: 1rem; }
    .success-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 0.5rem; }
    .success-sub { color: var(--gray); font-size: 0.9rem; line-height: 1.6; }
    .back-btn {
      display: inline-block; margin-top: 1.5rem;
      background: var(--red); color: white;
      padding: 0.8rem 2rem; border-radius: 50px;
      text-decoration: none; font-weight: 700; font-size: 0.95rem;
    }

    /* ERROR */
    .error-msg { color: var(--red); font-size: 0.85rem; text-align: center; margin-top: 0.5rem; display: none; }

    @media (max-width: 480px) {
      .card { padding: 2rem 1.5rem; }
      .star { font-size: 2.2rem; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">सेवा<span>Khoj</span></div>
  <div class="subtitle">Rate Your Experience</div>

  <!-- RATING FORM -->
  <div id="ratingForm">
    <div class="worker-info">
      <div class="worker-avatar">👷</div>
      <div>
        <div class="worker-name" id="workerName">Loading...</div>
        <div class="worker-service" id="workerService">Loading...</div>
      </div>
    </div>

    <div class="section-label">How was your experience? ⭐</div>
    <div class="stars-container">
      <span class="star" onclick="setRating(1)" id="star1">⭐</span>
      <span class="star" onclick="setRating(2)" id="star2">⭐</span>
      <span class="star" onclick="setRating(3)" id="star3">⭐</span>
      <span class="star" onclick="setRating(4)" id="star4">⭐</span>
      <span class="star" onclick="setRating(5)" id="star5">⭐</span>
    </div>
    <div class="star-label" id="starLabel">Click a star to rate</div>

    <div class="form-group">
      <label>Your Name</label>
      <input type="text" id="customerName" placeholder="e.g. Ram Sharma" />
    </div>

    <div class="form-group">
      <label>Your Comment (Optional)</label>
      <textarea id="comment" placeholder="Tell others about your experience..."></textarea>
    </div>

    <button class="submit-btn" onclick="submitRating()">⭐ Submit Rating</button>
    <div class="error-msg" id="errorMsg">Please fill all fields and select a star rating!</div>
  </div>

  <!-- SUCCESS SCREEN -->
  <div class="success-screen" id="successScreen">
    <div class="success-icon">🎉</div>
    <div class="success-title">Thank You!</div>
    <div class="success-sub">Your rating has been submitted successfully. This helps us improve our services in Butwal!</div>
    <a href="https://www.sewakhoj.com" class="back-btn">🏠 Back to SewаKhoj</a>
  </div>
</div>

<script>
  const API_URL = 'https://sewakhoj.onrender.com/api';
  let selectedRating = 0;
  let workerId = null;
  let bookingId = null;

  const starLabels = ['', '😞 Poor', '😐 Fair', '🙂 Good', '😊 Very Good', '🤩 Excellent!'];

  // Get worker and booking from URL
  window.onload = function() {
    const params = new URLSearchParams(window.location.search);
    workerId = params.get('worker');
    bookingId = params.get('booking');
    const workerName = params.get('name') || 'Your Worker';
    const workerService = params.get('service') || 'Home Service';

    document.getElementById('workerName').textContent = decodeURIComponent(workerName);
    document.getElementById('workerService').textContent = decodeURIComponent(workerService);

    if (!workerId || !bookingId) {
      document.getElementById('workerName').textContent = 'Demo Worker';
      document.getElementById('workerService').textContent = 'House Cleaning';
    }
  }

  function setRating(stars) {
    selectedRating = stars;
    for (let i = 1; i <= 5; i++) {
      const star = document.getElementById('star' + i);
      if (i <= stars) { star.classList.add('active'); }
      else { star.classList.remove('active'); }
    }
    document.getElementById('starLabel').textContent = starLabels[stars];
  }

  async function submitRating() {
    const customerName = document.getElementById('customerName').value.trim();
    const comment = document.getElementById('comment').value.trim();

    if (!customerName || selectedRating === 0) {
      document.getElementById('errorMsg').style.display = 'block';
      return;
    }
    document.getElementById('errorMsg').style.display = 'none';

    try {
      const res = await fetch(`${API_URL}/ratings`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          worker: workerId || '000000000000000000000000',
          booking: bookingId || '000000000000000000000000',
          customer_name: customerName,
          stars: selectedRating,
          comment: comment
        })
      });
      const data = await res.json();
      if (data.success) {
        document.getElementById('ratingForm').style.display = 'none';
        document.getElementById('successScreen').style.display = 'block';
      }
    } catch (err) {
      alert('Error submitting rating. Please try again!');
    }
  }
</script>
</body>
</html>
